<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>TASTE & CHILL PARTY ｜ Shared Moments</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Noto+Serif+TC:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f1eb;
            --text-main: #2c2c2c;
            --text-muted: #5e5e5e;
            --accent-color: #8c7e6c;
            --card-bg: #ffffff;
            --border-light: rgba(44, 44, 44, 0.1);
            --font-serif: 'Cormorant Garamond', 'Noto Serif TC', 'Baskerville', 'Georgia', serif;
            --font-sans: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-sans) !important;
            line-height: 1.8;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Hero ── */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 12vh 20px 25vh;
            position: relative;
            background: radial-gradient(circle at 50% 0%, #fcfbf9 0%, #f4f1eb 100%);
        }

        .monogram {
            font-family: var(--font-serif) !important;
            font-size: 1rem;
            font-weight: 400;
            letter-spacing: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .monogram .line { width: 60px; height: 1px; background-color: var(--text-main); }

        /* ── 居中對稱疊字主視覺 ── */
        .ty-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .ty-thank {
            font-family: var(--font-serif) !important;
            font-size: 4.2rem;
            font-style: italic;
            font-weight: 400;
            line-height: 1.1;
            background: linear-gradient(135deg, #a69172 0%, var(--accent-color) 50%, #6b5c49 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: slideDown 0.85s ease 0.1s forwards;
        }

        .ty-rule {
            width: 68px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--accent-color), transparent);
            margin: 15px 0;
            transform: scaleX(0);
            transform-origin: center;
            animation: growRule 0.65s ease 0.65s forwards;
        }

        .ty-you {
            font-family: var(--font-serif) !important;
            font-size: 5.5rem;
            font-weight: 600;
            line-height: 1.05;
            background: linear-gradient(135deg, #a69172 0%, var(--accent-color) 50%, #6b5c49 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: slideUp 0.85s ease 0.9s forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes growRule {
            from { transform: scaleX(0); opacity: 0; }
            to   { transform: scaleX(1); opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Invite copy ── */
        .english-invite {
            font-family: var(--font-serif) !important;
            font-size: 0.95rem;
            font-style: italic;
            color: var(--text-muted);
            line-height: 2;
            margin-bottom: 5vh;
        }
        .english-invite span { display: block; margin-bottom: 5px; }

        /* ── Scroll arrow ── */
        .scroll-indicator {
            position: absolute;
            bottom: 18vh;
            left: 50%;
            transform: translateX(-50%);
            color: var(--accent-color);
            animation: bounce 2s infinite ease-in-out;
            cursor: pointer;
            z-index: 99;
            padding: 10px;
        }
        .scroll-indicator svg { width: 36px; height: 36px; stroke-width: 2; }
        @keyframes bounce {
            0%   { transform: translate(-50%, -6px); opacity: 0.2; }
            50%  { opacity: 1; }
            100% { transform: translate(-50%,  6px); opacity: 0.2; }
        }

        /* ── 靜態結語 ── */
        .closing-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 90px 20px 110px;
        }

        .closing-vline {
            width: 1px;
            height: 64px;
            background: linear-gradient(to bottom, transparent, var(--accent-color));
            margin-bottom: 38px;
        }

        .closing-phrase {
            font-family: var(--font-serif) !important;
            font-size: 1.25rem;
            font-style: italic;
            font-weight: 400;
            color: var(--text-main);
            letter-spacing: 0.5px;
            line-height: 1.8;
            margin-bottom: 30px;
            text-align: center;
        }

        .closing-rule-h {
            width: 48px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--accent-color), transparent);
            margin-bottom: 30px;
        }

        .twitter-link {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            font-family: var(--font-sans) !important;
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .twitter-link:hover { color: var(--text-main); }
        .twitter-link svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .hero { padding: 10vh 20px 25vh !important; }
            .scroll-indicator { bottom: 20vh !important; }
            .ty-thank { font-size: 3.2rem; }
            .ty-you   { font-size: 4.2rem; }
            .ty-rule  { width: 52px; margin: 11px 0; }
            .closing-phrase { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="monogram">VIP <span class="line"></span> COCO</div>

        <div class="ty-stack">
            <span class="ty-thank">Heartfelt</span>
            <div class="ty-rule"></div>
            <span class="ty-you">Gratitude</span>
        </div>

        <div class="english-invite">
            <span>It meant the world to celebrate this new chapter with you</span>
            <span>TASTE &amp; CHILL PARTY hosted by 牙 · June 13</span>
        </div>

        <div class="scroll-indicator"
             onclick="document.getElementById('closing').scrollIntoView({behavior:'smooth'});">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
        </div>
    </header>

    <section class="closing-section" id="closing">
        <div class="closing-vline"></div>
        <p class="closing-phrase">見過最好的你 ♡</p>
        <div class="closing-rule-h"></div>
        <a href="https://x.com/un_iad?s=11" target="_blank" rel="noopener" class="twitter-link">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.763l7.737-8.835L2.25 2.25h7.228l4.254 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
            </svg>
            @un_iad
        </a>
    </section>

</body>
</html>
